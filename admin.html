<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - Rubies</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background: #f9f9f9; direction: rtl; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2, h3 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button.delete-btn { background: #dc3545; padding: 5px 10px; font-size: 14px; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: right; }
        th { background: #f2f2f2; }
        img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>لوحة تحكم موقع Rubies</h2>
    
    <h3>إضافة منتج جديد</h3>
    <form id="productForm">
        <div class="form-group">
            <label>اسم المنتج:</label>
            <input type="text" id="pName" placeholder="مثال: Shoulder Bag Black" required>
        </div>
        <div class="form-group">
            <label>القسم (Category):</label>
            <select id="pCat">
                <option value="Shoulder bag">Shoulder bag</option>
                <option value="Clutch">Clutch</option>
                <option value="Hats">Hats</option>
                <option value="Phone strap">Phone strap</option>
            </select>
        </div>
        <div class="form-group">
            <label>رابط الصورة (Image URL):</label>
            <input type="url" id="pImg" placeholder="https://ik.imagekit.io/..." required>
        </div>
        <div class="form-group">
            <label>الشارة (Badge) - اختياري:</label>
            <input type="text" id="pBadge" placeholder="مثال: SALE أو NEW (سيبها فاضية لو مفيش)">
        </div>
        <button type="submit">إضافة المنتج للموقع</button>
    </form>

    <h3>المنتجات الحالية على الموقع</h3>
    <table>
        <thead>
            <tr>
                <th>الصورة</th>
                <th>الاسم</th>
                <th>القسم</th>
                <th>الشارة</th>
                <th>تحكم</th>
            </tr>
        </thead>
        <tbody id="productsTableBody">
            </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // الـ Config بتاعك يا مارك ربطته هنا جاهز
    const firebaseConfig = {
        apiKey: "AIzaSyDAngLmOVnVsT89QnPyDngMzl1GylCsUzo",
        authDomain: "rubies-eg.firebaseapp.com",
        databaseURL: "https://rubies-eg-default-rtdb.firebaseio.com",
        projectId: "rubies-eg",
        storageBucket: "rubies-eg.firebasestorage.app",
        messagingSenderId: "355806127285",
        appId: "1:355806127285:web:3b9d735a02addb7678cafc",
        measurementId: "G-GR31EYR7MR"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const productsRef = ref(db, 'products');

    // 1. إضافة منتج جديد
    document.getElementById('productForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const newProductRef = push(productsRef); 
        
        set(newProductRef, {
            id: Date.now(), 
            name: document.getElementById('pName').value,
            cat: document.getElementById('pCat').value,
            img: document.getElementById('pImg').value,
            badge: document.getElementById('pBadge').value || ""
        }).then(() => {
            alert('تم إضافة المنتج بنجاح يا مارك!');
            document.getElementById('productForm').reset();
        }).catch((err) => {
            alert('حصل مشكلة: ' + err.message);
        });
    });

    // 2. جلب المنتجات وعرضها في الجدول
    onValue(productsRef, (snapshot) => {
        const tableBody = document.getElementById('productsTableBody');
        tableBody.innerHTML = ''; 
        
        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(key => {
                const product = data[key];
                const row = `
                    <tr>
                        <td><img src="${product.img}" alt=""></td>
                        <td>${product.name}</td>
                        <td>${product.cat}</td>
                        <td>${product.badge || '-'}</td>
                        <td><button class="delete-btn" onclick="deleteProduct('${key}')">حذف</button></td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', row);
            });
        } else {
            tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">لا يوجد منتجات حالياً. ضيف أول منتج من الفورم فوق!</td></tr>';
        }
    });

    // دالة الحذف
    window.deleteProduct = (key) => {
        if(confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
            remove(ref(db, 'products/' + key)).then(() => {
                alert('تم حذف المنتج بنجاح!');
            });
        }
    }
</script>
</body>
</html>
